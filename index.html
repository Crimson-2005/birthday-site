<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎀💖</title>

<!-- AOS for fade animations -->
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<!-- AOS JS -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>Loading Your Surprise...</h1>
  <p id="intro-timer">5</p>
  <button id="revealBtn" class="hidden" onclick="startHeartGame()">Click to Start 💖</button>
</div>

<!-- HEARTS & BALLOONS -->
<div class="hearts"></div>
<div id="balloons"></div>

<!-- GAME AREA -->
<div id="gameIntro" class="hidden card">
  <h2 id="gameTitle">Catch the Hearts 💖</h2>
  <p id="gameMessage">Click hearts to unlock the next surprise! 🌸</p>
  <div id="gameBox"></div>
</div>

<!-- MAIN POST-GAME CONTENT -->
<div id="mainContent">
  <div class="card" data-aos="fade-up">
    <h1>Happy Birthday, Gorgeous! 🎀💖</h1>
    <p>Sparks, hearts, bows… all just for you! ✨ Keep smiling and enjoy your magical day! 🌸💫</p>
  </div>
  <div class="card" data-aos="fade-up">
    <p>Lots of love and hugs! 💕</p>
  </div>
</div>

<!-- AUDIO -->
<audio id="birthdayMusic" loop>
  <source src="birthday.mp3" type="audio/mp3">
</audio>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
