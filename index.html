<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheesy's Birthday Surprise 🧀</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BACKGROUND MUSIC -->
<audio id="birthdayBgm" loop>
  <source src="birthday.mp3" type="audio/mp3">
</audio>

<audio id="meowSfx">
  <source src="meow.mp3" type="audio/mp3">
</audio>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>Surprise Loading...</h1>
  <p id="intro-timer">5</p>
  <button id="revealBtn" class="hidden" onclick="revealSurprise()">Click for your Surprise 🎁</button>
</div>

<!-- MAIN CONTENT -->
<div id="main" class="hidden">
  <!-- Floating Hearts & Bubbles -->
  <div id="heartsContainer"></div>
  <div id="bubblesContainer"></div>

  <div class="card" id="card">
    <div id="countdownBox">
      <h2>Birthday Countdown</h2>
      <div id="countdown"></div>
    </div>

    <div id="celebrationBox" class="hidden">
      <h2>🎉 Happy Birthday! 🎉</h2>
      <p>Surprise for you!</p>
    </div>
  </div>

  <button id="startButton" class="hidden">🎊 For You 🎊</button>
</div>

<!-- SECRET POPUP -->
<div id="secret" class="secret">
  <h1>🎉 SECRET UNLOCKED 🎉</h1>
  <p>
    Secret surprise mil gaya? 😼<br><br>
    Maza aayaa??<br>
    Once again.. Happy Birthday Yaar!! 🎈💛
  </p>
  <button onclick="closeSecret()">Close Secret Mode</button>
</div>

<script src="script.js"></script>
</body>
</html>
