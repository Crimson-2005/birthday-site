<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Birthday Somya 🎂</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>Something magical is coming… ✨</h1>
  <p id="countdown">5</p>
  <button id="enterBtn" class="hidden">Enter Birthday 💖</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="hidden">
  <div class="card" data-aos="zoom-in">
    <h2>Happy Birthday Somya! 🎂✨</h2>
    <p>Write text here. 🎉</p>
  </div>

  <div class="card" data-aos="fade-up">
    <p>Write text here. 💖 Random words for placeholder. 🫶</p>
  </div>
<div class="heart-break">• • • 💗 • • •</div>
  <div class="card" data-aos="zoom-in">
    <h2>Another Card Title Here</h2>
    <p>Write text here. 🎈 Keep adding more cards as needed.</p>
  </div>

  <!-- Floating effects container -->
  <div class="hearts"></div>
  <div id="balloons"></div>
</div>

<!-- AUDIO -->
<audio id="birthdayMusic" src="birthday.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
