<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somya's Birthday Surprise 🎉</title>
  <link rel="stylesheet" href="style.css">

  <!-- CONFETTI -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- AOS Animations -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading">
    <h1>Loading... <span id="countdown">5</span></h1>
    <button id="enterBtn" class="hidden">Enter 🎉</button>
  </div>

 <!-- MAIN CONTENT -->
<div id="mainContent" class="hidden">
  <div class="card" data-aos="zoom-in">
    <h2>Happy Birthday Somya! 🎂✨</h2>
    <p>Write text here. 🎉</p>
  </div>

  <div class="card" data-aos="fade-up">
    <p>Write text here. 💖 Random words for placeholder. 🫶</p>
  </div>
<div class="heart-break">• • • 💗 • • •</div>
  <div class="card" data-aos="zoom-in">
    <h2>Another Card Title Here</h2>
    <p>Write text here. 🎈 Keep adding more cards as needed.</p>
  </div>

  <!-- FLOATING HEARTS -->
  <div class="hearts"></div>
  <div id="balloons"></div>

  <!-- BIRTHDAY MUSIC -->
  <audio id="birthdayMusic" loop>
    <source src="birthday-music.mp3" type="audio/mpeg">
  </audio>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>
</body>
</html>
