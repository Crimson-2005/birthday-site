<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Somya's Dreamy Birthday 💖</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<!-- AUDIO -->
<audio id="birthdayBgm" loop>
  <source src="birthday.mp3" type="audio/mp3">
</audio>
<audio id="meowSfx">
  <source src="meow.mp3" type="audio/mp3">
</audio>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>Loading Something Magical… ✨</h1>
  <p id="intro-timer">5</p>
  <button id="revealBtn" class="hidden">Enter the Birthday 💖</button>
</div>

<!-- FLOATING CONTAINERS -->
<div class="hearts"></div>
<div id="balloons"></div>
<div id="sparkleContainer"></div>

<!-- MAIN CONTENT -->
<div id="main" class="hidden">
  <div class="card">
    <h1>Happy Birthday, Somya! 🌸</h1>
    <p>
      Wishing you a pastel-filled day 💖, floating balloons 🎈, sparkles ✨ and tiny surprises 🫧.<br>
      Enjoy your magical day! 🎀
    </p>
    <button id="gameBtn">Play the Mini Game 🎮</button>
  </div>

  <!-- GAME -->
  <div id="gameContainer" class="hidden">
    <h2 id="gameTitle">Game 1: Catch the Hearts 💖</h2>
    <p id="gameMessage"></p>
    <div id="gameBox"></div>
  </div>
</div>

<!-- SECRET -->
<div id="secret" class="secret">
  <div class="card">
    <h2>🎉 SECRET UNLOCKED 🎉</h2>
    <p>You did it! MEOWWW 😼💖<br>Happy Birthday again, Somya!</p>
    <button onclick="closeSecret()">Close 💌</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
