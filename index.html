<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loader -->
  <div id="loader" class="loader">Loading...</div>

  <!-- Main Content -->
  <main id="main" class="hidden">
    <!-- Confetti canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Hearts & Bubbles -->
    <div id="heartsContainer"></div>
    <div id="bubblesContainer"></div>

    <!-- Countdown / Celebration Box -->
    <div class="card" id="card">
      <div id="countdownBox">
        <h2>Birthday Countdown</h2>
        <div id="countdown"></div>
      </div>
      <div id="celebrationBox" class="hidden">
        <h2>🎉 Happy Birthday! 🎉</h2>
        <p>Surprise for you!</p>
      </div>
    </div>

    <!-- Start Button -->
    <button id="startButton" class="hidden">🎊 For You 🎊</button>

    <!-- Audio -->
    <audio id="bgAudio" src="birthday.mp3" loop></audio>
  </main>

  <script src="script.js"></script>
</body>
</html>
